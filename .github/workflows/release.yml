name: Release plugin zip

# On every push to main, read the version from the porto-sender.php header. If no
# git tag v<version> exists yet, run the unit suite, build the distributable zip
# (bin/build-zip.sh — the same script used locally), and publish a GitHub Release
# with the zip attached. Pushes that don't bump the version are a no-op, so a release
# is cut exactly when the version number changes on main.

on:
  push:
    branches: [ main ]

permissions:
  contents: write   # create tags + releases

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need existing tags to detect a version bump

      - name: Read plugin version
        id: ver
        run: |
          VERSION="$(grep -m1 -E '^[[:space:]]*\*[[:space:]]*Version:' porto-sender.php \
            | sed -E 's/.*Version:[[:space:]]*//' | tr -d '[:space:]')"
          if [ -z "$VERSION" ]; then echo "::error::could not read Version from porto-sender.php"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"   >> "$GITHUB_OUTPUT"

      - name: Has this version already been released?
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::tag ${{ steps.ver.outputs.tag }} already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup PHP + Composer
        if: steps.check.outputs.exists == 'false'
        uses: shivammathur/setup-php@v2
        with:
          # 8.3 for CI: the dev tooling (PHPUnit 11) needs >=8.2. The plugin's runtime
          # floor stays 8.1 — only altcha ships, and the zip is identical regardless of
          # the build-PHP version (vendor is downloaded, not compiled).
          php-version: '8.3'
          tools: composer

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dev deps + run unit tests (release gate)
        if: steps.check.outputs.exists == 'false'
        run: |
          composer install --no-interaction --no-progress
          composer test:unit

      - name: Build distributable zip
        if: steps.check.outputs.exists == 'false'
        run: bash bin/build-zip.sh

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: dist/wp-porto-sender-${{ steps.ver.outputs.version }}.zip
