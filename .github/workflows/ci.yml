name: CI

# Unit tests on every push and PR (fast, no Docker). Integration tests run the real
# wp-env stack (WordPress + MySQL in Docker) on pull requests and pushes to main — the
# same setup as local, so CI matches `npm run test:integration` exactly.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-interaction --no-progress
      - run: composer test:unit

  integration:
    # Heavy (boots Docker WordPress + MySQL) — run on PRs and main pushes, not every branch push.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: composer install --no-interaction --no-progress
      - run: npm ci
      - name: Start wp-env
        run: npm run env:start
      - name: Integration tests
        run: npm run test:integration
